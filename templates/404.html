{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Elite Wealth Capital</title>
    <link rel="icon" type="image/webp" href="{% static 'images/logo.webp' %}">
    <link rel="stylesheet" href="{% static 'css/style.css?v=20260308' %}">
    <link rel="stylesheet" href="{% static 'css/glassmorphism-theme.css?v=20260308' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #0A1F44 0%, #1e293b 50%, #0A1F44 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
        }
        .error-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700 0%, #3B82F6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #fff;
        }
        .error-message {
            font-size: 1.1rem;
            color: #94a3b8;
            max-width: 500px;
            margin-bottom: 2rem;
        }
        .error-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, #FFD700 0%, #DAA520 100%);
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(255, 215, 0, 0.4);
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .btn-home:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        .error-illustration {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .helpful-links {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .helpful-links h3 {
            font-size: 1rem;
            color: #64748b;
            margin-bottom: 1rem;
        }
        .helpful-links ul {
            list-style: none;
            padding: 0;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .helpful-links a {
            color: #60a5fa;
            text-decoration: none;
            transition: color 0.2s;
        }
        .helpful-links a:hover {
            color: #FFD700;
        }
        .logo-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
        }
        .logo-link img {
            height: 50px;
        }
    </style>
</head>
<body>
    <a href="{% url 'home' %}" class="logo-link">
        <img src="{% static 'images/logo.webp' %}" alt="Elite Wealth Capital" width="40" height="40">
    </a>

    <div class="error-container">
        <div class="error-illustration">🔍</div>
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            Oops! The page you're looking for doesn't exist or has been moved. 
            Don't worry, let's get you back on track.
        </p>
        
        <div class="error-actions">
            <a href="javascript:history.back()" class="btn-back">
                ← Go Back
            </a>
            <a href="{% url 'home' %}" class="btn-home">
                🏠 Home Page
            </a>
        </div>

        <div class="helpful-links">
            <h3>Or try these pages:</h3>
            <ul>
                <li><a href="{% url 'investment_plans' %}">Investment Plans</a></li>
                <li><a href="{% url 'about' %}">About Us</a></li>
                <li><a href="{% url 'contact' %}">Contact</a></li>
                <li><a href="{% url 'faq' %}">FAQ</a></li>
                <li><a href="{% url 'login' %}">Login</a></li>
            </ul>
        </div>
    </div>
        <script defer src="{% static 'js/main.js' %}"></script>
</body>
</html>
