services:
  - type: web
    name: elite-wealth-capital
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: elite-wealth-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*"
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend

databases:
  - name: elite-wealth-db
    plan: free
    databaseName: elite_wealth_db
    user: elite_wealth_user
