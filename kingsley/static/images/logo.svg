/* Placeholder SVG Logo */
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="100" fill="#1E3A8A" rx="8"/>
  
  <!-- Logo Symbol -->
  <g transform="translate(20, 20)">
    <!-- Coin circle -->
    <circle cx="30" cy="30" r="28" fill="url(#goldGradient)"/>
    <!-- Dollar sign -->
    <text x="30" y="40" font-size="40" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">$</text>
  </g>
  
  <!-- Text -->
  <g transform="translate(70, 20)">
    <text x="0" y="25" font-size="24" font-weight="bold" fill="url(#goldGradient)" font-family="Arial">ELITE</text>
    <text x="0" y="50" font-size="14" font-weight="600" fill="#E5E7EB" font-family="Arial">WEALTH CAPITA</text>
  </g>
</svg>
