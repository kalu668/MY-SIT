{% extends 'base.html' %}
{% load static %}

{% block title %}Access Denied - Elite Wealth Capital{% endblock %}

{% block content %}
<style>
    .error-page {
        min-height: 80vh;
        background: linear-gradient(135deg, #050B1A 0%, #0A1F44 100%);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .error-container {
        text-align: center;
        padding: 60px 40px;
        max-width: 600px;
    }
    .error-code {
        font-size: 120px;
        font-weight: 800;
        background: linear-gradient(135deg, #f39c12 0%, #e74c3c 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 20px;
    }
    .error-title {
        font-size: 32px;
        color: #fff;
        margin-bottom: 15px;
        font-weight: 600;
    }
    .error-message {
        font-size: 18px;
        color: rgba(255,255,255,0.7);
        margin-bottom: 40px;
        line-height: 1.6;
    }
    .error-btn {
        background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
        color: #fff;
        padding: 15px 40px;
        border-radius: 50px;
        font-weight: 600;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s ease;
        border: none;
    }
    .error-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(243, 156, 18, 0.4);
        color: #fff;
    }
    .error-icon {
        font-size: 80px;
        color: #e74c3c;
        margin-bottom: 30px;
        opacity: 0.8;
    }
</style>

<div class="error-page">
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-ban"></i>
        </div>
        <div class="error-code">403</div>
        <h1 class="error-title">Access Denied</h1>
        <p class="error-message">
            You don't have permission to access this page. 
            If you believe this is an error, please contact support.
        </p>
        <a href="{% url 'dashboard:index' %}" class="error-btn">
            <i class="fas fa-home me-2"></i>Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
