{% extends 'base.html' %}
{% block title %}Password Reset Sent{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin: 100px auto;">
    <div class="text-center">
        <i class="fas fa-check-circle" style="font-size: 5rem; color: #27ae60;"></i>
        <h2 class="mt-4 mb-3">Check Your Email</h2>
        <p class="text-white-50 mb-4">
            We've sent you an email with instructions to reset your password.
            Please check your inbox and spam folder.
        </p>
        <a href="{% url 'accounts:login' %}" class="btn btn-primary">
            <i class="fas fa-arrow-left me-2"></i>Back to Login
        </a>
    </div>
</div>
{% endblock %}
