{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin: 100px auto;">
    <div class="text-center">
        <i class="fas fa-check-circle" style="font-size: 5rem; color: #27ae60;"></i>
        <h2 class="mt-4 mb-3">Password Reset Complete!</h2>
        <p class="text-white-50 mb-4">
            Your password has been successfully reset. You can now login with your new password.
        </p>
        <a href="{% url 'accounts:login' %}" class="btn btn-success btn-lg">
            <i class="fas fa-sign-in-alt me-2"></i>Login Now
        </a>
    </div>
</div>
{% endblock %}
